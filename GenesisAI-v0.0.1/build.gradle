
plugins { id 'java' }
allprojects{
 group='ai.genesis'
 version='0.0.1-SNAPSHOT'
 repositories{ mavenCentral() }
}
subprojects{
 apply plugin:'java'
 java{ toolchain{ languageVersion=JavaLanguageVersion.of(21)}}
 test{ useJUnitPlatform() }
 dependencies{ testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'}
}
